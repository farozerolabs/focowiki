name: Feature request
description: Suggest an improvement for Focowiki.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem should this feature solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Admin UI
        - Admin API
        - Developer OpenAPI
        - Upload processing
        - Worker
        - Docker Compose
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternatives or workarounds.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add examples, screenshots, or links that explain the request.
    validations:
      required: false
