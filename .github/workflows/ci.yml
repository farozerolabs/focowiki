name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@11.7.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate production Compose template
        run: |
          cp .env.example .env
          pnpm compose:example:config

      - name: Validate Docker development Compose template
        run: |
          cp .env.dev.example .env
          pnpm compose:dev:example:config

      - name: Validate local infrastructure Compose template
        run: |
          cp .env.dev.example .env
          pnpm compose:local:example:config

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Validate documentation
        run: pnpm docs:validate

      - name: Validate local path leaks
        run: pnpm validate:no-local-paths
