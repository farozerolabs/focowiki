name: CI

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    env:
      FOCOWIKI_TEST_DATABASE_URL: postgres://focowiki:focowiki@127.0.0.1:55432/focowiki
      REDIS_URL: redis://127.0.0.1:56379/0

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: focowiki
          POSTGRES_USER: focowiki
          POSTGRES_PASSWORD: focowiki
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U focowiki -d focowiki"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      redis:
        image: redis:8-alpine
        ports:
          - 56379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@11.7.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm security:audit

      - name: Validate production Compose template
        run: |
          cp .env.example .env
          pnpm compose:example:config

      - name: Validate Docker development Compose template
        run: |
          cp .env.dev.example .env
          pnpm compose:dev:example:config

      - name: Validate local full-stack Compose template
        run: |
          cp .env.dev.example .env
          pnpm compose:local:example:config

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build API Docker image
        run: |
          docker build --target api --build-arg FOCOWIKI_RELEASE_VERSION=0.0.0-ci -t focowiki-api:ci .
          docker image inspect focowiki-api:ci --format '{{json .Config.Env}}' | grep 'FOCOWIKI_RELEASE_VERSION=0.0.0-ci'

      - name: Migrate CI database with API image
        run: >-
          docker run --rm --network host --env-file .env.dev.example
          -e DATABASE_URL="${FOCOWIKI_TEST_DATABASE_URL}"
          -e REDIS_URL="${REDIS_URL}"
          focowiki-api:ci node apps/api/runtime/migrate.mjs

      - name: Validate current schema idempotence
        run: |
          docker run --rm --network host --env-file .env.dev.example -e DATABASE_URL="${FOCOWIKI_TEST_DATABASE_URL}" -e REDIS_URL="${REDIS_URL}" focowiki-api:ci node apps/api/runtime/migration-preflight.mjs
          docker run --rm --network host --env-file .env.dev.example -e DATABASE_URL="${FOCOWIKI_TEST_DATABASE_URL}" -e REDIS_URL="${REDIS_URL}" focowiki-api:ci node apps/api/runtime/migrate.mjs

      - name: Validate compatible migration paths
        run: >-
          pnpm --filter @focowiki/api exec vitest run
          test/migrations.test.ts
          test/migration-preflight.test.ts
          test/migration-preflight.integration.test.ts
          test/tree-graph-storage-migration.integration.test.ts

      - name: Start S3 health fixture
        run: |
          node scripts/ci/s3-health-fixture.mjs &
          echo $! > /tmp/focowiki-s3-health-fixture.pid

      - name: Test
        run: pnpm test

      - name: Validate 100k graph candidate query plan
        env:
          FOCOWIKI_RUN_SCALE_QUERY_PLAN_TESTS: "true"
        run: >-
          pnpm --filter @focowiki/api exec vitest run
          test/graph-candidate-query-plan.integration.test.ts

      - name: Validate source-to-activation smoke flow
        run: >-
          pnpm --filter @focowiki/api exec vitest run
          test/upload-session-repository.integration.test.ts
          test/source-dispatch-repository.integration.test.ts
          test/publication-generation-repository.integration.test.ts
          test/active-generation-read-repository.integration.test.ts

      - name: Test validation scripts
        run: pnpm test:validation

      - name: Build
        run: pnpm build

      - name: Validate Admin production bundle
        run: pnpm validate:admin-build-debug-output

      - name: Validate OpenAPI contract
        run: pnpm openapi:validate

      - name: Validate API Docker worker runtimes
        run: docker run --rm --entrypoint node focowiki-api:ci -e "const fs=require('node:fs'); for (const file of ['apps/api/runtime/main.mjs','apps/api/runtime/migrate.mjs','apps/api/runtime/migration-preflight.mjs','apps/api/runtime/source-worker.mjs','apps/api/runtime/publication-worker.mjs','apps/api/runtime/maintenance-worker.mjs']) fs.accessSync(file);"

      - name: Validate API image role health
        run: |
          docker run --rm --network host --env-file .env.dev.example -e DATABASE_URL="${FOCOWIKI_TEST_DATABASE_URL}" -e REDIS_URL="${REDIS_URL}" focowiki-api:ci node apps/api/runtime/source-worker.mjs --healthcheck
          docker run --rm --network host --env-file .env.dev.example -e DATABASE_URL="${FOCOWIKI_TEST_DATABASE_URL}" -e REDIS_URL="${REDIS_URL}" focowiki-api:ci node apps/api/runtime/publication-worker.mjs --healthcheck
          docker run --rm --network host --env-file .env.dev.example -e DATABASE_URL="${FOCOWIKI_TEST_DATABASE_URL}" -e REDIS_URL="${REDIS_URL}" focowiki-api:ci node apps/api/runtime/maintenance-worker.mjs --healthcheck

      - name: Build Admin Docker image
        run: docker build --target admin -t focowiki-admin:ci .

      - name: Validate documentation
        env:
          FOCOWIKI_RELEASE_VERSION: 0.0.0-ci
        run: pnpm docs:validate

      - name: Validate local path leaks
        run: pnpm validate:no-local-paths

      - name: Stop S3 health fixture
        if: always()
        run: |
          if [[ -f /tmp/focowiki-s3-health-fixture.pid ]]; then
            kill "$(cat /tmp/focowiki-s3-health-fixture.pid)" || true
          fi
