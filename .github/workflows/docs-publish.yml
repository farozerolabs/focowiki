name: Publish Documentation

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to deploy, for example v0.2.1."
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release version
        id: release
        shell: bash
        env:
          RELEASE_TAG_INPUT: ${{ inputs.release_tag || '' }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${RELEASE_TAG_INPUT}"
          else
            if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
              echo "::error::Documentation deployment requires a release tag."
              exit 1
            fi
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Documentation releases require a semantic version tag like v1.2.3."
            exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${tag#v}" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@11.7.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate documentation
        env:
          FOCOWIKI_RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: pnpm docs:validate

      - name: Configure Pages
        uses: actions/configure-pages@v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: docs/.vitepress/dist

  deploy:
    name: Deploy documentation
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
