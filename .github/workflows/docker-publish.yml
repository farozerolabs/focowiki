name: Publish Docker Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  attestations: write
  artifact-metadata: write
  id-token: write

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/farozerolabs/focowiki-api
  ADMIN_IMAGE: ghcr.io/farozerolabs/focowiki-admin

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Docker image releases require a semantic version tag like v1.2.3."
              exit 1
            fi
            echo "is_release_tag=true" >> "${GITHUB_OUTPUT}"
            echo "version=${tag#v}" >> "${GITHUB_OUTPUT}"
          else
            echo "is_release_tag=false" >> "${GITHUB_OUTPUT}"
            echo "version=manual-${GITHUB_SHA::12}" >> "${GITHUB_OUTPUT}"
          fi

      - name: API image metadata
        id: meta-api
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.API_IMAGE }}
          labels: |
            org.opencontainers.image.title=Focowiki API
            org.opencontainers.image.version=${{ steps.release.outputs.version }}
          tags: |
            type=ref,event=branch,enable=${{ github.event_name == 'workflow_dispatch' && github.ref_type == 'branch' }}
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ steps.release.outputs.is_release_tag == 'true' }}

      - name: Admin image metadata
        id: meta-admin
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.ADMIN_IMAGE }}
          labels: |
            org.opencontainers.image.title=Focowiki Admin
            org.opencontainers.image.version=${{ steps.release.outputs.version }}
          tags: |
            type=ref,event=branch,enable=${{ github.event_name == 'workflow_dispatch' && github.ref_type == 'branch' }}
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ steps.release.outputs.is_release_tag == 'true' }}

      - name: Build and push API image
        id: build-api
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: Dockerfile
          target: api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          build-args: |
            FOCOWIKI_RELEASE_VERSION=${{ steps.release.outputs.version }}
          provenance: mode=max
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push Admin image
        id: build-admin
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: Dockerfile
          target: admin
          push: true
          tags: ${{ steps.meta-admin.outputs.tags }}
          labels: ${{ steps.meta-admin.outputs.labels }}
          provenance: mode=max
          cache-from: type=gha,scope=admin
          cache-to: type=gha,mode=max,scope=admin

      - name: Attest API image
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-name: ${{ env.API_IMAGE }}
          subject-digest: ${{ steps.build-api.outputs.digest }}
          push-to-registry: true

      - name: Attest Admin image
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-name: ${{ env.ADMIN_IMAGE }}
          subject-digest: ${{ steps.build-admin.outputs.digest }}
          push-to-registry: true
