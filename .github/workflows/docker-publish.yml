name: Publish Docker Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  attestations: write
  artifact-metadata: write
  id-token: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/farozerolabs/focowiki-api
  ADMIN_IMAGE: ghcr.io/farozerolabs/focowiki-admin
  FOCOWIKI_TEST_DATABASE_URL: postgres://focowiki:focowiki@127.0.0.1:55432/focowiki
  REDIS_URL: redis://127.0.0.1:56379/0

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: focowiki
          POSTGRES_USER: focowiki
          POSTGRES_PASSWORD: focowiki
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U focowiki -d focowiki"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      redis:
        image: redis:8-alpine
        ports:
          - 56379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Docker image releases require a semantic version tag like v1.2.3."
              exit 1
            fi
            echo "is_release_tag=true" >> "${GITHUB_OUTPUT}"
            echo "version=${tag#v}" >> "${GITHUB_OUTPUT}"
          else
            echo "is_release_tag=false" >> "${GITHUB_OUTPUT}"
            echo "version=manual-${GITHUB_SHA::12}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Verify main release source
        shell: bash
        run: |
          git fetch origin main --prune
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ "${GITHUB_REF_TYPE}" != "branch" || "${GITHUB_REF_NAME}" != "main" ]]; then
              echo "::error::Manual Docker publishing must run from the main branch."
              exit 1
            fi
            release_commit="$(git rev-parse HEAD)"
          else
            if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
              echo "::error::Docker publishing requires a release tag."
              exit 1
            fi
            release_commit="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"
          fi
          if ! git merge-base --is-ancestor "${release_commit}" origin/main; then
            echo "::error::Docker publishing is allowed only for commits already contained in main."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@11.7.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release contracts
        env:
          FOCOWIKI_RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          pnpm test:validation
          pnpm openapi:validate

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: API image metadata
        id: meta-api
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.API_IMAGE }}
          labels: |
            org.opencontainers.image.title=Focowiki API
            org.opencontainers.image.version=${{ steps.release.outputs.version }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ steps.release.outputs.is_release_tag == 'true' }}

      - name: Admin image metadata
        id: meta-admin
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.ADMIN_IMAGE }}
          labels: |
            org.opencontainers.image.title=Focowiki Admin
            org.opencontainers.image.version=${{ steps.release.outputs.version }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ steps.release.outputs.is_release_tag == 'true' }}

      - name: Build and push API image
        id: build-api
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: Dockerfile
          target: api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          build-args: |
            FOCOWIKI_RELEASE_VERSION=${{ steps.release.outputs.version }}
          provenance: mode=max
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Start S3 health fixture
        run: |
          node scripts/ci/s3-health-fixture.mjs &
          echo $! > /tmp/focowiki-s3-health-fixture.pid

      - name: Validate published API image roles
        shell: bash
        run: |
          image="${API_IMAGE}@${{ steps.build-api.outputs.digest }}"
          docker pull "${image}"
          docker tag "${image}" focowiki-api:release-smoke
          docker run --rm --network host --env-file .env.dev.example -e DATABASE_URL="${FOCOWIKI_TEST_DATABASE_URL}" -e REDIS_URL="${REDIS_URL}" focowiki-api:release-smoke node apps/api/runtime/migrate.mjs
          docker run --rm --network host --env-file .env.dev.example -e DATABASE_URL="${FOCOWIKI_TEST_DATABASE_URL}" -e REDIS_URL="${REDIS_URL}" focowiki-api:release-smoke node apps/api/runtime/migration-preflight.mjs
          docker run --rm --network host --env-file .env.dev.example -e DATABASE_URL="${FOCOWIKI_TEST_DATABASE_URL}" -e REDIS_URL="${REDIS_URL}" focowiki-api:release-smoke node apps/api/runtime/source-worker.mjs --healthcheck
          docker run --rm --network host --env-file .env.dev.example -e DATABASE_URL="${FOCOWIKI_TEST_DATABASE_URL}" -e REDIS_URL="${REDIS_URL}" focowiki-api:release-smoke node apps/api/runtime/publication-worker.mjs --healthcheck
          docker run --rm --network host --env-file .env.dev.example -e DATABASE_URL="${FOCOWIKI_TEST_DATABASE_URL}" -e REDIS_URL="${REDIS_URL}" focowiki-api:release-smoke node apps/api/runtime/maintenance-worker.mjs --healthcheck
          api_container="$(docker run -d --network host --env-file .env.dev.example -e DATABASE_URL="${FOCOWIKI_TEST_DATABASE_URL}" -e REDIS_URL="${REDIS_URL}" focowiki-api:release-smoke node apps/api/runtime/main.mjs)"
          trap 'docker rm -f "${api_container}" >/dev/null 2>&1 || true' EXIT
          curl --fail --retry 20 --retry-delay 1 --retry-all-errors http://127.0.0.1:43000/healthz
          curl --fail --retry 20 --retry-delay 1 --retry-all-errors http://127.0.0.1:43200/healthz
          docker rm -f "${api_container}" >/dev/null
          trap - EXIT

      - name: Build and push Admin image
        id: build-admin
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: Dockerfile
          target: admin
          push: true
          tags: ${{ steps.meta-admin.outputs.tags }}
          labels: ${{ steps.meta-admin.outputs.labels }}
          provenance: mode=max
          cache-from: type=gha,scope=admin
          cache-to: type=gha,mode=max,scope=admin

      - name: Attest API image
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-name: ${{ env.API_IMAGE }}
          subject-digest: ${{ steps.build-api.outputs.digest }}
          push-to-registry: true

      - name: Attest Admin image
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-name: ${{ env.ADMIN_IMAGE }}
          subject-digest: ${{ steps.build-admin.outputs.digest }}
          push-to-registry: true

      - name: Stop S3 health fixture
        if: always()
        run: |
          if [[ -f /tmp/focowiki-s3-health-fixture.pid ]]; then
            kill "$(cat /tmp/focowiki-s3-health-fixture.pid)" || true
          fi
